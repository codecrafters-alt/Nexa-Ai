<svg width="220" height="48" viewBox="0 0 220 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nexa-gradient" x1="0" y1="0" x2="220" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3A8DFF"/>
      <stop offset="1" stop-color="#8F5CFF"/>
    </linearGradient>
    <linearGradient id="nexa-glow" x1="12" y1="12" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3A8DFF"/>
      <stop offset="1" stop-color="#8F5CFF"/>
    </linearGradient>
    <filter id="glow" x="0" y="0" width="48" height="48" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Abstract, premium, futuristic symbol: flowing infinity ribbon -->
  <g filter="url(#glow)">
    <path d="M14,24 C18,8 34,8 34,24 S18,40 14,24" stroke="url(#nexa-glow)" stroke-width="4.5" fill="none"/>
    <path d="M14,24 Q24,14 34,24" stroke="url(#nexa-gradient)" stroke-width="3" fill="none" opacity="0.7"/>
    <ellipse cx="24" cy="24" rx="10" ry="4" fill="url(#nexa-gradient)" opacity="0.12"/>
  </g>
  <!-- Nexa AI text, reduced gap and aligned -->
  <text x="42" y="29" dominant-baseline="middle" alignment-baseline="middle" font-family="'Poppins', 'Montserrat', 'Segoe UI', 'Arial', sans-serif" font-size="28" font-weight="700" fill="url(#nexa-gradient)" letter-spacing="2.2">
    Nexa <tspan font-weight="500" font-family="'Poppins', 'Montserrat', 'Segoe UI', 'Arial', sans-serif" fill="url(#nexa-gradient)">AI</tspan>
  </text>
</svg>